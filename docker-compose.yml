version: "3.9"

services:
  backend:
    build: ./backend
    container_name: taskflow_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY env var is required — set it before running docker-compose}
      - DEBUG=false
      - ALLOWED_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: taskflow_db
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  frontend:
    build: ./frontend
    container_name: taskflow_ui
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
